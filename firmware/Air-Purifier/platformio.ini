; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html
[env:rymcu-esp32-s3-devkitc-1]
platform = espressif32
board = rymcu-esp32-s3-devkitc-1
framework = espidf
monitor_speed = 115200
monitor_port = /dev/cu.usbmodem101
upload_port = /dev/cu.usbmodem101

board_build.flash_size = 16MB 

; tell compiler to also look in other directories
build_flags =
    -I$PROJECT_PACKAGES_DIR/framework-espidf/components/bt/host/nimble/nimble/porting/nimble/include
    -I$PROJECT_PACKAGES_DIR/framework-espidf/components/bt/host/nimble/nimble/porting/npl/freertos/include
    -I$PROJECT_PACKAGES_DIR/framework-espidf/components/bt/host/nimble/nimble/nimble/include
    -I$PROJECT_PACKAGES_DIR/framework-espidf/components/bt/host/nimble/nimble/nimble/host/include
    -I$PROJECT_PACKAGES_DIR/framework-espidf/components/bt/host/nimble/nimble/nimble/host/util/include
    -I$PROJECT_PACKAGES_DIR/framework-espidf/components/bt/host/nimble/nimble/nimble/host/services/gap/include
    -I$PROJECT_PACKAGES_DIR/framework-espidf/components/bt/host/nimble/nimble/nimble/host/services/gatt/include
    -I$PROJECT_PACKAGES_DIR/framework-espidf/components/bt/host/nimble/port/include
    -I$PROJECT_PACKAGES_DIR/framework-espidf/components/bt/host/nimble/esp-hci/include
    -I$PROJECT_PACKAGES_DIR/framework-espidf/components/bt/host/nimble/nimble/nimble/transport/include